metadata:
  name: feynman-bonus
  version: 1
  description: AI-Feynman BONUS set (20 named physics results), aifeynman-original rendering — the 3rd rendering
    of the bonus set alongside fastsrb B1-B20 (SRSD) and srsd-dummy B1-B20, mirroring the main set's variant structure.
  sources: &id001
  - Feynman Symbolic Regression Database BONUS set (Udrescu & Tegmark 2020, Science Advances 6(16):eaay2631)
  - BonusEquations.csv vendored from WassimTenachi/PhySO (MIT, commit bfbfa88) — the canonical surviving copy (the
    original space.mit.edu host is dead); see assets/upstream/feynman_bonus/NOTICE
  license: specs regenerated from the equation database (formulas + ranges = cited derived facts; original data
    files unlicensed and NOT redistributed); csv copy via PhySO (MIT)
  sampling_defaults:
    n_points: 100
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: per-variable uniform in the original integer-endpoint boxes; singularity-free (verified); per-point
      rejection conditioning as everywhere.
    errata: the csv's '# variables' column undercounts test_12/13/18/19; corrected + asserted (PhySO's documented
      fix).
    variants: 1:1 base_eq_id links to fastsrb B<N>; renderings join the union holdout independently. ERBench's Feynman
      collection drops bonus_10 (arccos) — this catalog keeps the arccos original.
