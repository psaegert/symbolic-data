metadata:
  name: livermore2
  version: 1
  description: Livermore2 suite (Vars2-7 groups, 25 each).
  sources:
  - Mundhenk et al. 2021 (NeurIPS), LLNL neural-guided GP seeding
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Livermore2-Vars2-1:
    raw: sqrt(x1+x2)*(2.97*x2**2+2.8*x2)
    prepared: sqrt(v1+v2)*(2.97*v2**2+2.8*v2)
    n_variables: 2
    sources:
    - Mundhenk et al. 2021 (NeurIPS), LLNL neural-guided GP seeding
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -10.0
        - 10.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - -10.0
        - 10.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -10
            - 10
            - 1000
        test: null
        function_set: Base
