metadata:
  name: erbench-phybench
  version: 1
  description: ERBench PHYBench family (90 entries after deduplication; headline eval tier).
  sources:
  - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
  - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
  license: MIT (ERBench paper table + upstream Eureka-Lab/PHYBench)
  eval_tier: headline
  sampling_defaults:
    n_points: 100
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: per-variable uniform (or uniform-integer for dtype=int rows) in the upstream support box; per-point
      rejection conditioning + meta.finite_fraction disclosure as everywhere. ERBench's own REFERENCE sampler (100
      pts/dim, 1-3-component mixtures in a half-width train sub-box, extrapolative eval region, noise w.p. 0.2)
      is an EVALUATION PROTOCOL, recorded here as provenance -- our harness samples the declared box directly.
    canonicalization: '''^''->''**'', ''Abs(''->''abs('', log(u,10)->log10-rewrite, x_k->v{k+1}; exact duplicates
      (expression+support+dtype) merged with names in meta.duplicate_of_rows.'
expressions:
  phybench_0:
    raw: 0.2333976725*(x_0*x_1*x_4**2)/(x_2*x_3**2*(1-x_4**2)**2)
    prepared: 0.2333976725*(v1*v2*v5**2)/(v3*v4**2*(1-v5**2)**2)
    n_variables: 5
    sources:
    - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
    - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
    vars:
      v1:
        name: x_0
        sample_range:
        - 0.001
        - 1000.0
        sample_type: &id001
        - uni
        - pos
      v2:
        name: x_1
        sample_range:
        - 0.2
        - 2.0
        sample_type: *id001
      v3:
        name: x_2
        sample_range:
        - 0.5
        - 1.5
        sample_type: *id001
      v4:
        name: x_3
        sample_range:
        - 0.1
        - 10.0
        sample_type: *id001
      v5:
        name: x_4
        sample_range:
        - 0.01
        - 0.99
        sample_type: *id001
      v0:
        name: y
    meta:
      erbench_task_id: phybench_0
      upstream_name: pybench_ID_495
      problem: The Verdet constant v as a function of atomic number density N, number of outer electrons Z, electron
        mass m, refractive index n, angular frequency ω, and resonance frequency ω₀, where x_0 is N, x_1 is Z, constant
        is m, x_2 is n, x_3 is ω, and x_4 is ω₀. For numerical stability, we use dimensionless parameters here.
