    raw: 5*x_0*x_1**2*x_2
    prepared: 5*v1*v2**2*v3
    n_variables: 3
    sources:
    - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
    - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
