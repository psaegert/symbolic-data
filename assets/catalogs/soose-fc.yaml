metadata:
  name: soose-fc
  version: 1
  description: 'SOOSE-FC: 200 out-of-training-sample NeSymReS skeletons, full constants: EVERY placeholder
    slot sampled (''one constant per term''), then sympy.simplify (which compounds literals beyond the
    sampling ranges); 2-6 literals per expression, no constant-free rows; frozen historical instantiation.'
  sources: &id001
  - Biggio et al. 2021 (arXiv:2106.06427), Neural Symbolic Regression that Scales (NeSymReS) — SOOSE test
    set
  - 'SymposiumOrganization/NeuralSymbolicRegressionThatScales (MIT); NC: test_set/nc.csv @ 09f5af4; WC/FC:
    data/benchmark/old_test.csv @ 0cfff79 (recovered from deleted history, see assets/upstream/soose/NOTICE)'
  license: MIT (SymposiumOrganization/NeuralSymbolicRegressionThatScales)
  sampling_defaults:
    n_points: 500
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: all variables uniform on [-10, 10] (upstream support), 500 points; domain-restricted ops
      (sqrt/log/asin over the full box) follow the per-point rejection convention — accepted points are
      the declared distribution conditioned on the valid domain; meta.finite_fraction (audit tool) discloses
      the per-entry valid fraction.
    variants: row i shares its skeleton across soose-nc/wc/fc; WC/FC carry meta.base_eq_id links to the
      NC row; block identity of the historical WC/FC source is inferred from constant density (NOTICE).
