metadata:
  name: pagie
  version: 1
  description: Pagie coevolution benchmark.
  sources:
  - Pagie & Hogeweg 1997 (Evolutionary Computation)
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Pagie-1:
    raw: div(1,(1+pow(x1,-4)))+div(1,(1+pow(x2,-4)))
    prepared: ((1)/((1+((v1)**(-4)))))+((1)/((1+((v2)**(-4)))))
    n_variables: 2
    sources:
    - Pagie & Hogeweg 1997 (Evolutionary Computation)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -5.0
        - 5.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - -5.0
        - 5.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            E:
            - -5
            - 5
            - 0.4
        test: null
        function_set: Koza
