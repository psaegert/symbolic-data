metadata:
  name: jin
  version: 1
  description: Jin Bayesian-SR suite.
  sources:
  - Jin et al. 2019 (arXiv:1910.08892), Bayesian Symbolic Regression
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Jin-1:
    raw: 2.5*pow(x1,4)-1.3*pow(x1,3)+0.5*pow(x2,2)-1.7*x2
    prepared: 2.5*((v1)**(4))-1.3*((v1)**(3))+0.5*((v2)**(2))-1.7*v2
    n_variables: 2
    sources:
    - Jin et al. 2019 (arXiv:1910.08892), Bayesian Symbolic Regression
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -3.0
        - 3.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - -3.0
        - 3.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -3.0
            - 3.0
            - 100
        test:
          all:
            U:
            - -3.0
            - 3.0
            - 30
        function_set: Jin
  Jin-2:
