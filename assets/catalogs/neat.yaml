      finite_fraction: 1.0
  Neat-5:
    raw: 2*sin(x1)*cos(x2)
    prepared: 2*sin(v1)*cos(v2)
    n_variables: 2
    sources:
    - Trujillo et al. 2016 (Information Sciences), neat Genetic Programming
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
