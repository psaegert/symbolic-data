metadata:
  name: vladislavleva
  version: 1
  description: Vladislavleva order-of-nonlinearity suite.
  sources:
  - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Vladislavleva-1:
    raw: div(exp(-pow(x1-1,2)),(1.2+pow((x2-2.5),2)))
    prepared: ((exp(-((v1-1)**(2))))/((1.2+(((v2-2.5))**(2)))))
    n_variables: 2
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.3
        - 4.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 0.3
        - 4.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - 0.3
            - 4
            - 100
        test:
          all:
            E:
            - -0.5
            - 10.5
            - 0.05
        function_set: Vladislavleva-B
  Vladislavleva-2:
    raw: exp(-x1)*pow(x1,3)*cos(x1)*sin(x1)*(cos(x1)*pow(sin(x1),2)-1)
    prepared: exp(-v1)*((v1)**(3))*cos(v1)*sin(v1)*(cos(v1)*((sin(v1))**(2))-1)
    n_variables: 1
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.05
        - 10.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            E:
            - 0.05
            - 10
            - 0.1
        test:
          all:
            E:
            - -0.5
            - 10.5
            - 0.05
        function_set: Vladislavleva-C
  Vladislavleva-3:
    raw: exp(-x1)*pow(x1,3)*cos(x1)*sin(x1)*(cos(x1)*pow(sin(x1),2)-1)*(x2-5)
    prepared: exp(-v1)*((v1)**(3))*cos(v1)*sin(v1)*(cos(v1)*((sin(v1))**(2))-1)*(v2-5)
    n_variables: 2
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.05
        - 10.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 0.05
        - 10.05
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          x1:
            E:
            - 0.05
            - 10
            - 0.1
          x2:
            E:
            - 0.05
            - 10.05
            - 2
        test:
          x1:
            E:
            - -0.5
            - 10.5
            - 0.05
          x2:
            E:
            - -0.5
            - 10.5
            - 0.5
        function_set: Vladislavleva-C
  Vladislavleva-4:
    raw: div(10,(5+(pow((x1-3),2)+pow((x2-3),2)+pow((x3-3),2)+pow((x4-3),2)+pow((x5-3),2))))
    prepared: ((10)/((5+((((v1-3))**(2))+(((v2-3))**(2))+(((v3-3))**(2))+(((v4-3))**(2))+(((v5-3))**(2))))))
    n_variables: 5
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v3:
        name: x3
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v4:
        name: x4
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v5:
        name: x5
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - 0.05
            - 6.05
            - 1024
        test:
          all:
            U:
            - -0.25
            - 6.35
            - 5000
        function_set: Vladislavleva-A
  Vladislavleva-5:
    raw: 30*(x1-1)*div(x3-1,(x1-10)*pow(x2,2))
    prepared: 30*(v1-1)*((v3-1)/((v1-10)*((v2)**(2))))
    n_variables: 3
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.05
        - 2.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 1.0
        - 2.0
        sample_type:
        - uni
        - pos
      v3:
        name: x3
        sample_range:
        - 0.05
        - 2.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          x1:
            U:
            - 0.05
            - 2
            - 300
          x2:
            U:
            - 1
            - 2
            - 300
          x3:
            U:
            - 0.05
            - 2
            - 300
        test:
          x1:
            E:
            - -0.05
            - 2.1
            - 0.15
          x2:
            E:
            - 0.95
            - 2.05
            - 0.1
          x3:
            E:
            - -0.05
            - 2.1
            - 0.15
        function_set: Vladislavleva-A
  Vladislavleva-6:
    raw: 6*sin(x1)*cos(x2)
    prepared: 6*sin(v1)*cos(v2)
    n_variables: 2
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.1
        - 5.9
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 0.1
        - 5.9
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - 0.1
            - 5.9
            - 30
        test:
          all:
            E:
            - -0.05
            - 6.05
            - 0.02
        function_set: Vladislavleva-B
  Vladislavleva-7:
    raw: (x1-3)*(x2-3)+2*sin(x1-4)*(x2-4)
    prepared: (v1-3)*(v2-3)+2*sin(v1-4)*(v2-4)
    n_variables: 2
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - 0.05
            - 6.05
            - 300
        test:
          all:
            U:
            - -0.25
            - 6.35
            - 1000
        function_set: Vladislavleva-C
  Vladislavleva-8:
    raw: div(pow((x1-3),4)+pow((x2-3),3)-(x2-3),pow((x2-2),4)+10)
    prepared: (((((v1-3))**(4))+(((v2-3))**(3))-(v2-3))/((((v2-2))**(4))+10))
    n_variables: 2
    sources:
    - Vladislavleva, Smits, den Hertog 2009 (IEEE TEC)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - 0.05
        - 6.05
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - 0.05
            - 6.05
            - 50
        test:
          all:
            E:
            - -0.25
            - 6.35
            - 0.2
        function_set: Vladislavleva-A
