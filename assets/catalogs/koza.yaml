metadata:
  name: koza
  version: 1
  description: Koza classic GP problems (quintic/sextic).
  sources:
  - Koza 1992/1994 (MIT Press), Genetic Programming I/II
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
    validity: 'accepted points follow the declared per-variable distribution CONDITIONED
      on the expression''s valid domain; meta.finite_fraction is the MC-estimated
      per-point valid fraction (n=20000); entries below 0.05 carry low_validity: true
      and need per-entry review.'
expressions:
  Koza-2:
    raw: pow(x1,5)-2*pow(x1,3)+x1
    prepared: ((v1)**(5))-2*((v1)**(3))+v1
    n_variables: 1
    sources:
    - Koza 1992/1994 (MIT Press), Genetic Programming I/II
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -1
            - 1
            - 20
        test: null
        function_set: Koza
      finite_fraction: 1.0
  Koza-3:
    raw: pow(x1,6)-2*pow(x1,4)+pow(x1,2)
    prepared: ((v1)**(6))-2*((v1)**(4))+((v1)**(2))
    n_variables: 1
    sources:
    - Koza 1992/1994 (MIT Press), Genetic Programming I/II
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -1
            - 1
            - 20
        test: null
        function_set: Koza
      finite_fraction: 1.0
