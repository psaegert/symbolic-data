metadata:
  name: grammarvae
  version: 1
  description: GrammarVAE equation benchmark.
  sources:
  - Kusner et al. 2017 (ICML), Grammar Variational Autoencoder
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  GrammarVAE-1:
    raw: 1./3+x1+sin(pow(x1,2))
    prepared: 1./3+v1+sin(((v1)**(2)))
    n_variables: 1
    sources:
    - Kusner et al. 2017 (ICML), Grammar Variational Autoencoder
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -10.0
        - 10.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            E:
            - -10
            - 10
            - 1000
        test: null
        function_set: GrammarVAE
