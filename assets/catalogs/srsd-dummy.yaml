metadata:
  name: srsd-dummy
  version: 1
  description: 'SRSD Feynman dummy-variable variant (120): the fastsrb/SRSD-lineage
    problems with 1-3 irrelevant variables inserted at random positions (feature-selection
    axis).'
  sources:
  - Feynman Symbolic Regression Database (Udrescu & Tegmark 2020, AI Feynman)
  - SRSD realistic ranges (Matsubara et al. 2024, CC BY 4.0 datasets / MIT code)
  - dummy recipe from omron-sinicx/srsd-benchmark dummy_column_mixer.py (MIT; Matsubara
    et al. 2024, 'Rethinking Symbolic Regression Datasets and Benchmarks for Scientific
    Discovery', DMLR)
  - dummy configuration fixed with authoring seed 20260710 (deterministic catalog)
  sampling_defaults:
    n_points: 100
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type)
    oracle_warning: 'adapters must NOT use a used-variable oracle here: variable masking
      (e.g. PySR padding:false) defeats the benchmark; eval configs must disable masking
      for every method'
    validity: 'accepted points follow the declared per-variable distribution CONDITIONED
      on the expression''s valid domain; meta.finite_fraction is the MC-estimated
      per-point valid fraction (n=20000); entries below 0.05 carry low_validity: true
      and need per-entry review.'
