metadata:
  name: keijzer
  version: 1
  description: Keijzer symbolic-regression suite.
  sources:
  - Keijzer 2003 (EuroGP), interval arithmetic + linear scaling
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Keijzer-1:
    raw: 0.3*x1*sin(2*pi*x1)
    prepared: 0.3*v1*sin(2*3.141592653589793*v1)
    n_variables: 1
    sources:
    - Keijzer 2003 (EuroGP), interval arithmetic + linear scaling
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            E:
            - -1
            - 1
            - 0.1
        test:
          all:
            E:
            - -1
            - 1
            - 0.001
        function_set: Keijzer
