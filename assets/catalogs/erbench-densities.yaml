metadata:
  name: erbench-densities
  version: 1
  description: ERBench Densities family (33 entries after deduplication; headline eval tier).
  sources:
  - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
  - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
  license: BSD-3-Clause (SciPy-derived, per ERBench README)
  eval_tier: headline
  sampling_defaults:
    n_points: 100
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: per-variable uniform (or uniform-integer for dtype=int rows) in the upstream support box; per-point
      rejection conditioning + meta.finite_fraction disclosure as everywhere. ERBench's own REFERENCE sampler (100
      pts/dim, 1-3-component mixtures in a half-width train sub-box, extrapolative eval region, noise w.p. 0.2)
      is an EVALUATION PROTOCOL, recorded here as provenance -- our harness samples the declared box directly.
    canonicalization: '''^''->''**'', ''Abs(''->''abs('', log(u,10)->log10-rewrite, x_k->v{k+1}; exact duplicates
      (expression+support+dtype) merged with names in meta.duplicate_of_rows.'
expressions:
  anglit:
    raw: cos(2*x_0)
    prepared: cos(2*v1)
    n_variables: 1
    sources:
    - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
    - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
    vars:
      v1:
        name: x_0
        sample_range:
        - -0.7853981633974483
        - 0.7853981633974483
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      erbench_task_id: densities_0
      distribution: anglit density
      scipy_doc: https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.anglit.html#scipy.stats.anglit
  arcsine:
    raw: 1/(pi*sqrt(x_0*(1 - x_0)))
    prepared: 1/(3.141592653589793*sqrt(v1*(1-v1)))
    n_variables: 1
    sources:
    - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
    - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
    vars:
      v1:
        name: x_0
        sample_range:
        - 0.001
        - 0.999
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      erbench_task_id: densities_1
      distribution: arcsine density
      scipy_doc: https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.arcsine.html#scipy.stats.arcsine
  logistic:
    raw: exp(-x_0)/(1+exp(-x_0))^2
    prepared: exp(-v1)/(1+exp(-v1))**2
    n_variables: 1
    sources:
    - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
    - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
    vars:
