      distribution: generalized pareto density
      scipy_doc: c = 2, https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.genpareto.html#scipy.stats.genpareto
  generalized exponential:
    raw: (1 + 2*(1 - exp(-2*x_0)))*exp(-3*x_0 + 1 - exp(-2*x_0))
    prepared: (1+2*(1-exp(-2*v1)))*exp(-3*v1+1-exp(-2*v1))
