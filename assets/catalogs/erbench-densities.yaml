        name: x_0
        sample_range:
        - -2.0
        - 2.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      erbench_task_id: densities_2
      distribution: logistic density
      scipy_doc: c = 1, https://docs.scipy.org/doc/scipy/reference/generated/scipy.stats.genlogistic.html#scipy.stats.genlogistic
  generalized pareto:
    raw: (1 + 2*x_0)^(-3/2)
    prepared: (1+2*v1)**(-3/2)
    n_variables: 1
