        sample_type:
        - uni
        - pos
      v8:
        name: x8
        sample_range:
        - 0.0
        - 3.0
        sample_type:
        - uni
        - pos
      v9:
        name: x9
        sample_range:
        - 0.0
        - 3.0
        sample_type:
        - uni
        - pos
      v10:
        name: x10
        sample_range:
        - 0.0
        - 3.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - 0.0
            - 3.0
            - 330
        test:
          all:
            U:
            - 0.0
            - 3.0
            - 170
        function_set: PKozaPlusSqrt
  Poly-5:
    raw: sin(pow(x1,3)-x1-pi/6)
    prepared: sin(((v1)**(3))-v1-3.141592653589793/6)
    n_variables: 1
    sources:
    - Poli 2003 lineage (via DSO aggregation)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -3.14
        - 3.14
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
