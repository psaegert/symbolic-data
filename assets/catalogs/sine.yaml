metadata:
  name: sine
  version: 1
  description: Sine composite benchmark.
  sources:
  - GP benchmark surveys (McDermott et al. 2012 lineage)
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Sine:
    raw: sin(x1)+sin(x1+pow(x1,2))
    prepared: sin(v1)+sin(v1+((v1)**(2)))
    n_variables: 1
    sources:
    - GP benchmark surveys (McDermott et al. 2012 lineage)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - 0.0
        - 6.2
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            E:
            - 0
            - 6.2
            - 0.1
        test: null
        function_set: None
