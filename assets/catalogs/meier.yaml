metadata:
  name: meier
  version: 1
  description: Meier suite.
  sources:
  - Meier et al. (via GP benchmark surveys)
  - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
    Petersen et al. 2021, Mundhenk et al. 2021)
  sampling_defaults:
    n_points: 20
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: vars use the `fastsrb` distribution (sample_range/sample_type); DSO
      train_spec ranges; evenly-spaced (E) upstream grids are sampled uniformly here
      (noted per entry as meta.dso_spec).
expressions:
  Meier-3:
    raw: div(pow(x1,2)*pow(x2,2),(x1+x2))
    prepared: ((((v1)**(2))*((v2)**(2)))/((v1+v2)))
    n_variables: 2
    sources:
    - Meier et al. (via GP benchmark surveys)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -1
            - 1
            - 50
        test: null
        function_set: None
  Meier-4:
    raw: div(pow(x1,5),pow(x2,3))
    prepared: ((((v1)**(5)))/(((v2)**(3))))
    n_variables: 2
    sources:
    - Meier et al. (via GP benchmark surveys)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - -1.0
        - 1.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -1
            - 1
            - 50
        test: null
        function_set: None
