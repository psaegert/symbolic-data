    raw: 1.57+24.3*x4
    prepared: 1.57+24.3*v4
    n_variables: 5
    sources:
    - Korns 2011 (GPTP IX), Accuracy in Symbolic Regression
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (BSD-3;
      Petersen et al. 2021, Mundhenk et al. 2021)
    vars:
      v1:
        name: x1
        sample_range:
        - -50.0
        - 50.0
        sample_type:
        - uni
        - pos
      v2:
        name: x2
        sample_range:
        - -50.0
        - 50.0
        sample_type:
        - uni
        - pos
      v3:
        name: x3
        sample_range:
