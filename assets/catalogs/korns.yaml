        - uni
        - pos
      v5:
        name: x5
        sample_range:
        - -50.0
        - 50.0
        sample_type:
        - uni
        - pos
      v0:
        name: y
    meta:
      dso_spec:
        train:
          all:
            U:
            - -50
            - 50
            - 100
        test:
          all:
            U:
            - -50
            - 50
            - 100
        function_set: Korns
