II.38.3:
    sources:
      - Feynman lectures, Feynman Symbolic Regression Benchmark
      - variable sampling ranges from Matsubara et at. 2024
      - moniker generated by ChatGPT
    difficulty: easy
    moniker: elastic_force
    raw: Y * A * x / d
    prepared: v1 * v2 * v3 / v4
    accept:
        - ((v1*v2*v3)/v4)
        - (v1*v2*(v3/v4))
    vars:
        v1:
          name: Y
          type: (float, positive)
          units: [-1, -2, 1, 0, 0]
          sample_range: [1.0e-1, 1.0e1]
          sample_type: [log, pos]
        v2:
          name: A
          type: (float, positive)
          units: [2, 0, 0, 0, 0]
          sample_range: [1.0e-4, 1.0e-2]
          sample_type: [log, pos]
        v3:
          name: x
          type: (float)
          units: [1, 0, 0, 0, 0]
          sample_range: [1.0e-3, 1.0e-1]
          sample_type: [log, pos_neg]
        v4:
          name: d
          type: (float, positive)
          units: [1, 0, 0, 0, 0]
          sample_range: [1.0e-2, 1.0]
          sample_type: [log, pos]
        v0:
          name: F
          type: (float)
          units: [1, -2, 1, 0, 0]
    constraints:
        - v4 != 0
II.38.14:
    sources:
      - Feynman lectures, Feynman Symbolic Regression Benchmark
      - variable sampling ranges from Matsubara et at. 2024
      - moniker generated by ChatGPT
    difficulty: easy
    moniker: shear_modulus
    raw: Y / (2 * (1 + sigma))
    prepared: v1 / (2 * (1 + v2))
    accept:
        - (v1/(2.0*(v2+1.0)))
        - (v1/(2.0+(2.0*v2)))
        - ((0.5*v1)/(v2+1.0))
        - (v1/((2.0*v2)+2.0))
        - ((0.5*v1)/(1.0+v2))
    vars:
        v1:
          name: Y
          type: (float, positive)
          units: [-1, -2, 1, 0, 0]
          sample_range: [1.0e-1, 1.0e1]
          sample_type: [log, pos]
        v2:
          name: sigma
          type: (float)
          units: [0, 0, 0, 0, 0]
          sample_range: [1.0e-2, 1.0]
          sample_type: [log, pos]
        v0:
          name: mu_S
          type: (float)
          units: [-1, -2, 1, 0, 0]
    constraints:
        - 1 + v2 != 0
