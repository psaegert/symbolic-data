# Project information
site_name: symbolic-data
site_description: Model-agnostic symbolic-regression data layer
site_author: Paul Saegert
repo_url: https://github.com/psaegert/symbolic-data
repo_name: psaegert/symbolic-data
edit_uri: blob/main/docs/

# Theme configuration
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.instant
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Sampling data: sampling.md
  - Benchmarks: benchmarks.md
  - Registries & extensibility: registries.md
  - Holdout & leak-safety: holdout.md

plugins:
  - search
  - autorefs
