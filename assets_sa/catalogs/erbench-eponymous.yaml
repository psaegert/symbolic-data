metadata:
  name: erbench-eponymous
  version: 1
  description: ERBench Eponymous family (195 entries after deduplication; headline eval tier).
  sources:
  - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
  - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
  license: CC-BY-SA-4.0 (Wikipedia-derived; see assets_sa LICENSE)
  eval_tier: headline
  sampling_defaults:
    n_points: 100
    method: random
    noise: 0.0
  source_kind: set
  conventions:
    sampling: per-variable uniform (or uniform-integer for dtype=int rows) in the upstream support box; per-point
      rejection conditioning + meta.finite_fraction disclosure as everywhere. ERBench's own REFERENCE sampler (100
      pts/dim, 1-3-component mixtures in a half-width train sub-box, extrapolative eval region, noise w.p. 0.2)
      is an EVALUATION PROTOCOL, recorded here as provenance -- our harness samples the declared box directly.
    canonicalization: '''^''->''**'', ''Abs(''->''abs('', log(u,10)->log10-rewrite, x_k->v{k+1}; exact duplicates
      (expression+support+dtype) merged with names in meta.duplicate_of_rows.'
expressions:
  eponymous_0:
    raw: sqrt((x_0 + 4*x_1/3)/x_2)
    prepared: sqrt((v1+4*v2/3)/v3)
    n_variables: 3
    sources:
    - ERBench (Kahlmeyer, Voigt, Habeck & Giesen, arXiv:2606.09276)
    - HuggingFace dataset EquationDiscovery/Equation_Recovery_Benchmark
    vars:
      v1:
        name: x_0
        sample_range:
        - 0.0
        - 95.05825033339732
        sample_type: &id001
        - uni
        - pos
      v2:
        name: x_1
        sample_range:
        - 63.433589833745664
        - 63.43558983374566
        sample_type: *id001
      v3:
        name: x_2
        sample_range:
        - 4.1390180172129476e-10
        - 10.0
        sample_type: *id001
      v0:
        name: y
    meta:
      erbench_task_id: eponymous_0
      equation_name: Adams–Williamson equation
      attribution: Wikipedia, 'List of scientific equations named after people' (CC-BY-SA-4.0); intervals LLM-suggested
        (mistral-large), author cross-verified per the ERBench paper
      near_degenerate_intervals:
      - 2
