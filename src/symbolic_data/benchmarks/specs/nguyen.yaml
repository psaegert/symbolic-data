# Benchmark spec (header) — references the `nguyen` problem-set. See symbolic_data.datasets.load_spec.
metadata:
  name: nguyen
  version: 1
  description: Nguyen symbolic-regression suite (Uy et al. 2011), 12 equations.
  sources:
    - Nguyen benchmark (Uy et al. 2011)
    - formulas + ranges from dso-org/deep-symbolic-optimization benchmarks.csv (Petersen et al. 2021)
source:
  kind: set
  mode: iterate          # set-source consumption: iterate (deterministic) | random
sampling:
  n_points: 20           # canonical Nguyen training-set size (DSO U[lo, hi, 20])
  method: random         # random | grid
  noise: 0.0
problems: nguyen         # -> the `nguyen` problem-set (benchmarks/data/nguyen.yaml)
